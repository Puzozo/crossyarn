name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/crossyarn
          git pull origin main

      - name: Install dependencies
        run: |
          cd /opt/crossyarn
          npm install

      - name: Generate Prisma client
        run: |
          cd /opt/crossyarn
          npx prisma generate

      - name: Build
        run: |
          cd /opt/crossyarn
          npm run build

      - name: Restart app
        run: |
          cd /opt/crossyarn
          pm2 restart crossyarn || pm2 start .next/standalone/server.js --name crossyarn
          pm2 save
